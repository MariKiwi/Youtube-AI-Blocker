services:
  api:
    image: ${API_IMAGE_NAME:-youtube-ai-blocker-api}:${API_IMAGE_TAG:-latest}
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-youtube_ai_blocker}:${POSTGRES_PASSWORD:-youtube_ai_blocker}@postgres:5432/${POSTGRES_DB:-youtube_ai_blocker}?schema=public
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://www.youtube.com}
      WRITE_RATE_LIMIT_WINDOW_MS: ${WRITE_RATE_LIMIT_WINDOW_MS:-60000}
      WRITE_RATE_LIMIT_MAX_REQUESTS: ${WRITE_RATE_LIMIT_MAX_REQUESTS:-30}
    ports:
      - "${API_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  website:
    image: ${WEBSITE_IMAGE_NAME:-youtube-ai-blocker-website}:${WEBSITE_IMAGE_TAG:-latest}
    build:
      context: ./website
      dockerfile: Dockerfile
      args:
        PUBLIC_WEBSITE_URL: ${PUBLIC_WEBSITE_URL:-https://your-website.example}
        CHROME_WEB_STORE_URL: ${CHROME_WEB_STORE_URL:-https://chromewebstore.google.com/}
        FIREFOX_ADDONS_URL: ${FIREFOX_ADDONS_URL:-https://addons.mozilla.org/}
        GITHUB_SOURCE_URL: ${GITHUB_SOURCE_URL:-https://github.com/MariKiwi/Youtube-AI-Blocker}
        GITHUB_RELEASES_URL: ${GITHUB_RELEASES_URL:-https://github.com/MariKiwi/Youtube-AI-Blocker/releases}
        GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
        UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
        UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
        UMAMI_HOST_URL: ${UMAMI_HOST_URL:-}
        UMAMI_DOMAINS: ${UMAMI_DOMAINS:-}
    restart: unless-stopped
    ports:
      - "${WEBSITE_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-youtube_ai_blocker}
      POSTGRES_USER: ${POSTGRES_USER:-youtube_ai_blocker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-youtube_ai_blocker}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-youtube_ai_blocker} -d ${POSTGRES_DB:-youtube_ai_blocker}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-youtube-ai-blocker-postgres-data}
