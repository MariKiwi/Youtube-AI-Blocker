services:
  postgres:
    image: postgres:17-alpine
    container_name: youtube-ai-blocker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: youtube_ai_blocker
      POSTGRES_USER: youtube_ai_blocker
      POSTGRES_PASSWORD: youtube_ai_blocker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

